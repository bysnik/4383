name: Test Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug list repository contents
      run: |
        echo "=== Содержимое репозитория ==="
        ls -la
        echo "=== Дерево файлов ==="
        find . -type f | head -20

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgl1-mesa-dri libgl1-mesa-glx libglu1-mesa \
          libfontconfig1 libfreetype6 libx11-6 libxext6 libxrender1 libxrandr2 \
          libxfixes3 libxcursor1 libxinerama1 libxi6 libxxf86vm1 libxkbcommon0 \
          libxkbcommon-x11-0

    - name: Download Ren'Py SDK
      run: |
        wget https://www.renpy.org/dl/8.5.2/renpy-8.5.2-sdk.tar.bz2
        tar -xjf renpy-8.5.2-sdk.tar.bz2
        echo "RENPY=$(pwd)/renpy-8.5.2-sdk/renpy.sh" >> $GITHUB_ENV

    - name: Create game directory inside SDK and copy files
      run: |
        echo "=== Создаём папку game внутри SDK ==="
        mkdir -p renpy-8.5.2-sdk/4383/game
        echo "=== Копируем все файлы из репозитория (кроме .git) ==="
        rsync -av --exclude='.git' --exclude='renpy-8.5.2-sdk' ./ renpy-8.5.2-sdk/4383/game/
        echo "=== Результат копирования ==="
        ls -la renpy-8.5.2-sdk/4383/game/
        echo "=== Поиск файлов testcases.rpy в скопированной папке ==="
        find renpy-8.5.2-sdk/game -name "testcases.rpy" -type f

    - name: Make test.sh executable (inside the game directory)
      run: |
        chmod +x renpy-8.5.2-sdk/4383/game/test.sh

    - name: Run tests
      env:
        RENPY: "${{ github.workspace }}/renpy-8.5.2-sdk/renpy.sh"
      run: |
        cd renpy-8.5.2-sdk
        xvfb-run -a ./renpy.sh game test my_tests