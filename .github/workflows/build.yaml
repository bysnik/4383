name: Build and Release

on:
  push:
    tags:
      - 'v*'   # запуск при пуше тегов вида v1.0, v2.1 и т.п.

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libgl1-mesa-glx libglu1-mesa \
            libfontconfig1 libfreetype6 libx11-6 libxext6 libxrender1 libxrandr2 \
            libxfixes3 libxcursor1 libxinerama1 libxi6 libxxf86vm1 libxkbcommon0 \
            libxkbcommon-x11-0

      - name: Download Ren'Py SDK
        run: |
          wget https://www.renpy.org/dl/8.5.2/renpy-8.5.2-sdk.tar.bz2
          tar -xjf renpy-8.5.2-sdk.tar.bz2

      - name: Prepare game directory in SDK
        run: |
          mkdir -p renpy-8.5.2-sdk/game
          rsync -av --exclude='.git' --exclude='renpy-8.5.2-sdk' ./ renpy-8.5.2-sdk/game/

      - name: Build distributions for Windows, macOS, Linux
        run: |
          cd renpy-8.5.2-sdk
          export SDL_AUDIODRIVER=dummy
          export ALSA_CONFIG_PATH=/dev/null
          xvfb-run -a ./renpy.sh launcher distribute game --package windows --package mac --package linux

      - name: Collect distribution files
        run: |
          mkdir -p artifacts
          # Копируем все собранные файлы (exe, dmg, tar.bz2, zip, sh) в папку artifacts
          find renpy-8.5.2-sdk/game/dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.tar.bz2" -o -name "*.zip" -o -name "*.sh" \) -exec cp -v {} artifacts/ \;

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*